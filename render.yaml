services:
  - type: web
    name: factory-video-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        value: sqlite:////var/data/app.db
      - key: CLIENT_ASSET_ROOT
        value: /var/data/client-assets
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: factory-video-data
      mountPath: /var/data
      sizeGB: 5
