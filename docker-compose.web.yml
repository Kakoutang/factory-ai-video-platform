services:
  backend:
    build:
      context: ./backend
    container_name: factory-video-backend
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
      CLIENT_ASSET_ROOT: /app/data/client-assets
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ./deploy/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    container_name: factory-video-frontend
    depends_on:
      - backend
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: factory-video-web
    depends_on:
      - frontend
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
